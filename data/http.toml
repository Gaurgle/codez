[[entry]]
code = "401"
name = "Unauthorized"
group = "4xx Client"
summary = "Authentication required or failed"
detail = "No or bad credentials. Despite the name, it is about authentication, not authorization."
fix = "Send valid credentials (e.g. a token in Authorization)."
ref = "RFC 9110 15.5.2"

[[entry]]
