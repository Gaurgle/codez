# Bluetooth LE error codes.
# HCI controller error codes, ATT protocol errors, and SMP pairing-failure reasons.
# Codes overlap across layers, so ATT/SMP entries are suffixed for clarity.

# --- HCI error codes (Core spec Vol 1, Part F) ---

[[entry]]
code = "0x01"
name = "Unknown HCI Command"
group = "HCI"
summary = "Controller does not recognise the command"

[[entry]]
code = "0x02"
name = "Unknown Connection Identifier"
group = "HCI"
summary = "No connection for the given handle"

[[entry]]
code = "0x03"
name = "Hardware Failure"
group = "HCI"
summary = "Controller hardware failure"

[[entry]]
code = "0x04"
name = "Page Timeout"
group = "HCI"
summary = "Page (connection attempt) timed out"

[[entry]]
code = "0x05"
name = "Authentication Failure"
group = "HCI"
summary = "Pairing or authentication failed"

[[entry]]
code = "0x06"
name = "PIN or Key Missing"
group = "HCI"
summary = "No stored key for the peer"
fix = "Re-pair the devices, or clear stale bonds."

[[entry]]
code = "0x07"
name = "Memory Capacity Exceeded"
group = "HCI"
summary = "Controller is out of memory"

[[entry]]
code = "0x08"
name = "Connection Timeout"
group = "HCI"
summary = "Link supervision timeout expired"

[[entry]]
code = "0x09"
name = "Connection Limit Exceeded"
group = "HCI"
summary = "No more connections allowed"

[[entry]]
code = "0x0B"
name = "ACL Connection Already Exists"
group = "HCI"
summary = "A connection to this device already exists"

[[entry]]
code = "0x0C"
name = "Command Disallowed"
group = "HCI"
summary = "Command not allowed in the current state"

[[entry]]
code = "0x0D"
name = "Connection Rejected, Limited Resources"
group = "HCI"
summary = "Rejected due to limited resources"

[[entry]]
code = "0x0E"
name = "Connection Rejected, Security"
group = "HCI"
summary = "Rejected for security reasons"

[[entry]]
code = "0x0F"
name = "Connection Rejected, Bad BD_ADDR"
group = "HCI"
summary = "Rejected, unacceptable device address"

[[entry]]
code = "0x10"
name = "Connection Accept Timeout"
group = "HCI"
summary = "No response within the accept timeout"

[[entry]]
code = "0x11"
name = "Unsupported Feature or Parameter"
group = "HCI"
summary = "Requested feature/parameter not supported"

[[entry]]
code = "0x12"
name = "Invalid HCI Command Parameters"
group = "HCI"
summary = "A command parameter was out of range"

[[entry]]
code = "0x13"
name = "Remote User Terminated Connection"
group = "HCI"
summary = "Peer closed the connection"

[[entry]]
code = "0x14"
name = "Remote Terminated, Low Resources"
group = "HCI"
summary = "Peer closed the link due to low resources"

[[entry]]
code = "0x15"
name = "Remote Terminated, Power Off"
group = "HCI"
summary = "Peer closed the link due to power off"

[[entry]]
code = "0x16"
name = "Connection Terminated by Local Host"
group = "HCI"
summary = "Local host closed the connection"

[[entry]]
code = "0x17"
name = "Repeated Attempts"
group = "HCI"
summary = "Too many pairing attempts; backoff active"

[[entry]]
code = "0x1A"
name = "Unsupported Remote Feature"
group = "HCI"
summary = "Peer does not support the feature"

[[entry]]
code = "0x1F"
name = "Unspecified Error"
group = "HCI"
summary = "Error with no more specific code"

[[entry]]
code = "0x22"
name = "LL Response Timeout"
group = "HCI"
summary = "Link layer / LMP response timed out"

[[entry]]
code = "0x23"
name = "LMP/LL Transaction Collision"
group = "HCI"
summary = "Procedure collision on the link"

[[entry]]
code = "0x25"
name = "Encryption Mode Not Acceptable"
group = "HCI"
summary = "Requested encryption mode rejected"

[[entry]]
code = "0x28"
name = "Instant Passed"
group = "HCI"
summary = "A scheduled instant has already passed"

[[entry]]
code = "0x3B"
name = "Unacceptable Connection Parameters"
group = "HCI"
summary = "Requested connection parameters rejected"

[[entry]]
code = "0x3C"
name = "Advertising Timeout"
group = "HCI"
summary = "Directed advertising completed without connecting"

[[entry]]
code = "0x3D"
name = "Terminated due to MIC Failure"
group = "HCI"
summary = "Connection lost, message integrity check failed"

[[entry]]
code = "0x3E"
name = "Connection Failed to be Established"
group = "HCI"
summary = "Connection setup did not complete"

# --- ATT protocol errors (Core spec Vol 3, Part F) ---

[[entry]]
code = "0x01 (ATT)"
name = "Invalid Handle"
group = "ATT"
summary = "The attribute handle is invalid"

[[entry]]
code = "0x02 (ATT)"
name = "Read Not Permitted"
group = "ATT"
summary = "Attribute cannot be read"

[[entry]]
code = "0x03 (ATT)"
name = "Write Not Permitted"
group = "ATT"
summary = "Attribute cannot be written"

[[entry]]
code = "0x04 (ATT)"
name = "Invalid PDU"
group = "ATT"
summary = "The attribute PDU was malformed"

[[entry]]
code = "0x05 (ATT)"
name = "Insufficient Authentication"
group = "ATT"
summary = "Link must be authenticated first"
fix = "Pair/authenticate before accessing this attribute."

[[entry]]
code = "0x06 (ATT)"
name = "Request Not Supported"
group = "ATT"
summary = "Server does not support the request"

[[entry]]
code = "0x07 (ATT)"
name = "Invalid Offset"
group = "ATT"
summary = "Offset past the end of the attribute"

[[entry]]
code = "0x08 (ATT)"
name = "Insufficient Authorization"
group = "ATT"
summary = "Client is not authorized"

[[entry]]
code = "0x0A (ATT)"
name = "Attribute Not Found"
group = "ATT"
summary = "No attribute in the given handle range"

[[entry]]
code = "0x0D (ATT)"
name = "Invalid Attribute Value Length"
group = "ATT"
summary = "Value length is not allowed"

[[entry]]
code = "0x0F (ATT)"
name = "Insufficient Encryption"
group = "ATT"
summary = "Link must be encrypted first"
fix = "Enable encryption (bond) before access."

[[entry]]
code = "0x11 (ATT)"
name = "Insufficient Resources"
group = "ATT"
summary = "Server is out of resources"

# --- SMP pairing failure reasons (Core spec Vol 3, Part H) ---

[[entry]]
code = "0x01 (SMP)"
name = "Passkey Entry Failed"
group = "SMP"
summary = "The entered passkey was wrong"

[[entry]]
code = "0x02 (SMP)"
name = "OOB Not Available"
group = "SMP"
summary = "Out-of-band data is not available"

[[entry]]
code = "0x03 (SMP)"
name = "Authentication Requirements"
group = "SMP"
summary = "Auth requirements cannot be met"

[[entry]]
code = "0x04 (SMP)"
name = "Confirm Value Failed"
group = "SMP"
summary = "Pairing confirm value did not match"

[[entry]]
code = "0x05 (SMP)"
name = "Pairing Not Supported"
group = "SMP"
summary = "Peer does not support pairing"

[[entry]]
code = "0x06 (SMP)"
name = "Encryption Key Size"
group = "SMP"
summary = "Key size is insufficient"

[[entry]]
code = "0x08 (SMP)"
name = "Unspecified Reason"
group = "SMP"
summary = "Pairing failed, no specific reason"

[[entry]]
code = "0x0B (SMP)"
name = "DHKey Check Failed"
group = "SMP"
summary = "LE Secure Connections DHKey check failed"

[[entry]]
code = "0x0C (SMP)"
name = "Numeric Comparison Failed"
group = "SMP"
summary = "User rejected the numeric comparison"
